server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-lived cache headers
    location ~* \.(js|css|png|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unmatched route gets index.html so
    # the Svelte router handles navigation client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
